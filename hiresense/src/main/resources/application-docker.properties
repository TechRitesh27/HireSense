# Docker profile — all values come from environment variables injected by docker-compose
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:hiresense}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

server.port=8080

# JWT
jwt.secret=${JWT_SECRET:yourVeryStrongSecretKeyForJwtTokenGeneration123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Spring AI — Google GenAI (Gemini) configuration
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-1.5-flash
